<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR (reusing your existing styles) -->
  <nav class="navbar">
    <div class="logo">StudyNest</div>

    <ul class="nav-links">
      <li><a href="./home.html">Home</a></li>
      <li><a href="./login.html">Login</a></li>
      <li><a href="./findGroup.html">Find Groups</a></li>
      <li><a href="./createGroup.html">Create Group</a></li>
    </ul>
  </nav>

  <!-- LOGIN FORM -->
  <section class="form-section">

    <h2>Login</h2>

    <form class="group-form" id="loginForm">

      <input 
        type="text" 
        id="email" 
        name="email" 
        placeholder="Email" 
        required 
      />

      <input 
        type="password" 
        id="password" 
        name="password" 
        placeholder="Password" 
        required 
      />

      <button type="button" class="primary-btn" onclick="login()">
        Login
      </button>

      <p id="message"></p>

    </form>

  </section>

  <section class="login-extra">
  <div class="login-extra-content">
    <h3>Why use StudyNest?</h3>

    <ul>
      <li>Join study groups instantly</li>
      <li>Stay organized with meetings</li>
      <li>Collaborate with classmates</li>
      <li>Never study alone again</li>
    </ul>

    <a href="findGroup.html" class="secondary-btn">
      Browse Groups
    </a>
  </div>
</section>

  <footer>
        <p>© 2026 StudyNest. Built for SUNY New Paltz Students.</p>
    </footer>

  <script>
    function login() {
        event.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:8080/users/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("Invalid login");
        }
        return response.json();
    })
    .then(user => {
        document.getElementById("message").innerText =
            "Welcome " + user.name;

        // optional: save login state
        localStorage.setItem("userId", user.id);
    })
    .catch(error => {
        document.getElementById("message").innerText =
            "Login failed";
    });
}
  </script>

</body>
</html>
